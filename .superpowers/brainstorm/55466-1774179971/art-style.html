    </div>
    <div class="card-body">
      <h3>像素艺术风格</h3>
      <p>复古像素画风，色块明显，有游戏机怀旧感。实现简单，文件小，性能好。</p>

  </div>

  <div class="card" data-choice="cartoon" onclick="toggleSelect(this)">
    <div class="card-image" style="background:linear-gradient(180deg,#87ceeb 0%,#c8e6c9 60%,#8bc34a 100%);padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:140px;">

      <div style="font-size:40px;margin-top:10px;filter:drop-shadow(2px 4px 4px rgba(0,0,0,0.3));">🧟‍♂️</div>

    </div>
    <div class="card-body">
      <h3>卡通/Q版风格</h3>
      <p>圆润可爱的卡通画风，接近原版PvZ风格。色彩鲜艳，角色有个性，适合休闲游戏。</p>

  <div class="card" data-choice="minimalist" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#f5f5f5;padding:20px;display:flex;align-items:center;justify-content:center;gap:20px;min-height:140px;">

    <div class="card-body">
      <h3>极简几何风格</h3>
      <p>简洁的几何形状和平面设计，现代感强。实现快，视觉清晰，专注于游戏机制。</p>
